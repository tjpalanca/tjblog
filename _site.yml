name: "tjpalanca"
title: "TJ Palanca"
description: |
  Personal website and blog of TJ Palanca. A quest to bring numbers and reality
  together, especially on issues surrounding the Philippines.
output_dir: "."
navbar:
  logo:
    image: site_libs/images/logo.png
    href: https://www.tjpalanca.com/
  right:
    - text: "Home"
      href: index.html
    - text: "Blog"
      href: blog.html
    - text: "Contact"
      href: contact.html
    - text: "About"
      href: about.html
    - text: "FAQ & Policies"
      href: policies.html
    - icon: fa fa-github
      href: https://www.github.com/tjpalanca
    - icon: fa fa-twitter
      href: https://www.twitter.com/tjpalanca
    - icon: fa fa-facebook
      href: https://www.facebook.com/tjpalanca.blog
    - icon: fa fa-rss
      href: blog.xml
output:
  distill::distill_article:
    css: site_libs/custom/styles.css
    includes:
      in_header:
      - _header.html
base_url: https://www.tjpalanca.com/
repository_url: https://www.github.com/tjpalanca/tjpalanca.github.io
creative_commons: CC BY-NC-SA
twitter:
  site: "@tjpalanca"
favicon: site_libs/images/favicon.png
collections:
  posts:
    disqus: jumbodumbothoughts
    share: [twitter, linkedin, facebook, pinterest]
    subscribe: _subscribe.html
