name: "tjpalanca"
title: "TJ Palanca"
description: |
  Personal website and blog of TJ Palanca. A quest to bring numbers and reality
  together, especially on issues surrounding the Philippines.
output_dir: "_site"
google_analytics: "UA-63170596-2"
navbar:
  logo:
    image: static/images/logo.png
    href: https://www.tjpalanca.com/
  right:
    - text: "home"
      href: index.html
    - text: "blog"
      href: blog.html
    - text: "field notes"
      href: https://www.notion.so/tjpalanca/e5b607382c7b4eb8a35b39529baafb60?v=1055655dc8a54f03859e42b221170e3d
    - text: "projects"
      href: https://www.notion.so/tjpalanca/894fb47ea10a48a4ba8e1fb64a930daf?v=d7a87fd1b02c47778e259f314cb73693
    - text: "thoughts"
      href: https://www.notion.so/tjpalanca/TJThoughts-eb07e3539ced437185b103378a6d5c1f
    - text: "contact"
      href: contact.html
    - text: "about"
      href: about.html
    - text: "faq & policies"
      href: policies.html
    - icon: fa fa-github
      href: https://www.github.com/tjpalanca
    - icon: fa fa-twitter
      href: https://www.twitter.com/tjpalanca
    - icon: fa fa-facebook
      href: https://www.facebook.com/tjpalanca.blog
    - icon: fa fa-rss
      href: blog.xml
output:
  distill::distill_article:
    includes:
      in_header: !expr if (Sys.getenv("IN_DEVELOPMENT") == "TRUE") "_header_dev.html" else "_header.html"
base_url: https://www.tjpalanca.com/
repository_url: https://www.github.com/tjpalanca/tjblog
creative_commons: CC BY-NC-SA
twitter:
  site: "@tjpalanca"
favicon: static/images/favicon.png
collections:
  posts:
    disqus: jumbodumbothoughts
    share: [twitter, linkedin, facebook, pinterest]
    subscribe: _subscribe.html
  notes:
    disqus: jumbodumbothoughts
    share: [twitter, linkedin, facebook, pinterest]
    subscribe: _subscribe.html
