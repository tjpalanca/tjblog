name: TJBlog Deployment

on:
    push:
        branches:
          - master
    pull_request:
        branches:
          - master

jobs:
    build_and_deploy:
        name: Build and deploy personal blog
        runs-on: ubuntu-latest
        steps:
          - name: Checkout the code
            uses: actions/checkout@v2
          - name: Login to Docker Hub
            run: >-
                echo ${DOCKERHUB_PASSWORD} |
                docker login -u ${DOCKERHUB_USERNAME} --password-stdin
            env:
                DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
                DOCKERHUB_PASSWORD: ${{ secrets.DOCKERHUB_PASSWORD }}
          - name: Retrieve and build the image
            run: make docker-pull && make docker-build
          - name: Publish the image
            if: github.event_name == 'push'
            run: make docker-publish
          - name: Send redeployment hook
            run: curl -X POST ${TJBLOG_REDEPLOYMENT_HOOK}?services=tjblog
            env:
                TJBLOG_REDEPLOYMENT_HOOK: ${{ secrets.TJBLOG_REDEPLOYMENT_HOOK }}
