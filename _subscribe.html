<div uk-margin style="border:0px solid #ccc; text-align:left;">
<form
  action="https://feedburner.google.com/fb/a/mailverify"
  method="post"
  target="popupwindow"
  onsubmit="window.open('https://feedburner.google.com/fb/a/mailverify?uri=tjpalanca-blog', 'popupwindow', 'scrollbars=yes,width=550,height=520');return true"
>
<p>
  <strong>
    If you would like to receive updates when I have a new post,
    enter your email address:
  </strong>
</p>
<input type="text" class="uk-input" name="email"/>
<input type="hidden" value="tjpalanca-blog" name="uri"/>
<input type="hidden" name="loc" value="en_US"/>
<button
  type="submit"
  class="uk-button uk-button-default uk-button-small"
  style="background-color: #2cbf53; color: white; margin-top: 10px;"
>
<div style="display:flex; align-items:center">
  <span uk-icon="icon: mail" style="margin-right: 2px;"></span>
  <span>Subscribe</span>
</div>
</button>
</form>
</div>

<script type="application/javascript">
  initialize_search_posts();
  initialize_code_folding();
  initialize_descriptions();
</script>
