<div class="social_footer">
<form
  style="border:0px solid #ccc; padding:3px; text-align:left;"
  action="https://feedburner.google.com/fb/a/mailverify"
  method="post"
  target="popupwindow"
  onsubmit="window.open('https://feedburner.google.com/fb/a/mailverify?uri=tjpalanca-blog', 'popupwindow', 'scrollbars=yes,width=550,height=520');return true"
>
<p>
  <strong>
    If you would like to receive updates when I have a new post,
    enter your email address:
  </strong>
</p>
<div uk-margin>
<input
  type="text"
  class="uk-input"
  name="email"
/>
<input type="hidden" value="tjpalanca-blog" name="uri"/>
<input type="hidden" name="loc" value="en_US"/>
<button
  type="submit"
  class="uk-button uk-button-default"
  style="background-color: #2cbf53; color: white;"
>
<span uk-icon="icon: mail"></span>&nbsp;Subscribe
</button>
</div>
</form>
</div>
